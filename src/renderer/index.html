<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./assets/icon-256.png" />
    <title>DevDeck</title>
  </head>
  <body>
    <header id="topbar">
      <div class="tb-brand">
        <img class="tb-logo" src="./assets/icon-256.png" alt="" />
        <span class="tb-title">DevDeck</span>
      </div>
      <div class="tb-drag"></div>
      <div class="top-actions">
        <button id="refresh" class="iconbtn" title="새로고침" aria-label="새로고침">↻</button>
      </div>
      <div class="win-controls">
        <button id="win-min" class="winbtn" aria-label="Minimize" title="Minimize">─</button>
        <button id="win-max" class="winbtn" aria-label="Maximize" title="Maximize">☐</button>
        <button id="win-close" class="winbtn winbtn-close" aria-label="Close" title="Close">✕</button>
      </div>
    </header>
    <div id="shell">
      <nav id="rail" aria-label="Views">
        <button class="rail-item active" data-view="projects" title="Projects" aria-current="page" aria-label="Projects">📁</button>
        <button class="rail-item" data-view="usage" title="Usage" aria-label="Usage">📊</button>
        <button class="rail-item" data-view="settings" title="Settings" aria-label="Settings">⚙</button>
        <button class="rail-item" data-view="next" title="Next" aria-label="Next">📋</button>
        <span class="rail-spacer"></span>
        <button id="lang-btn" class="rail-item" title="Language" aria-label="Language">🌐</button>
      </nav>
      <main id="content">
        <section id="view-projects" class="view active">
          <div class="view-toolbar">
            <button id="new-project" class="primary">+ 새 프로젝트</button>
            <label class="chk"><input type="checkbox" id="neglected-only" /> 방치만</label>
            <button id="show-hidden" class="chip">🙈 숨김 <span id="hidden-count">0</span></button>
            <input type="text" id="proj-search" placeholder="Search projects…" aria-label="Search projects…" />
            <select id="proj-sort" aria-label="Sort">
              <option value="activity">Activity</option>
              <option value="uncommitted">Uncommitted</option>
              <option value="name">Name</option>
              <option value="opened">Last opened</option>
            </select>
            <div class="view-toggle" role="group" aria-label="View mode">
              <button id="view-cards" class="vtbtn active" title="Cards" aria-label="Cards">⊞</button>
              <button id="view-list" class="vtbtn" title="List" aria-label="List">☰</button>
            </div>
            <select id="agent-select" class="hidden" aria-label="Agent"></select>
            <span class="vt-spacer"></span>
            <button id="open-selected" class="primary" disabled>▶ 선택 열기</button>
          </div>
          <div id="cards">로딩 중…</div>
        </section>
        <section id="view-usage" class="view"></section>
        <section id="view-settings" class="view"><div id="settings-form"></div></section>
        <section id="view-next" class="view"></section>
      </main>
    </div>
    <div id="update-banner" class="hidden" role="status"></div>
    <div id="toast-host" aria-live="assertive"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
