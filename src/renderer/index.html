<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>DevDeck</title>
  </head>
  <body>
    <header id="topbar">
      <h1>DevDeck</h1>
      <div class="top-actions">
        <button id="refresh" class="iconbtn" title="새로고침">↻</button>
      </div>
    </header>
    <div id="shell">
      <nav id="rail">
        <button class="rail-item active" data-view="projects" title="Projects">📁</button>
        <button class="rail-item" data-view="usage" title="Usage">📊</button>
        <button class="rail-item" data-view="settings" title="Settings">⚙</button>
        <span class="rail-spacer"></span>
        <button id="lang-btn" class="rail-item" title="Language">🌐</button>
      </nav>
      <main id="content">
        <section id="view-projects" class="view active">
          <div class="view-toolbar">
            <label class="chk"><input type="checkbox" id="neglected-only" /> 방치만</label>
            <button id="show-hidden" class="chip">🙈 숨김 <span id="hidden-count">0</span></button>
            <span class="vt-spacer"></span>
            <button id="open-selected" class="primary" disabled>▶ 선택 열기</button>
          </div>
          <div id="cards">로딩 중…</div>
        </section>
        <section id="view-usage" class="view"></section>
        <section id="view-settings" class="view"><div class="empty">설정 (준비 중)</div></section>
      </main>
    </div>
    <div id="toast-host" aria-live="assertive"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
